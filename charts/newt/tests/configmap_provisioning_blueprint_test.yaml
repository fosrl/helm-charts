suite: Provisioning blueprint ConfigMap
templates:
  - templates/configmap-provisioning-blueprint.yaml
tests:
  - it: renders ConfigMap with provisioningBlueprintData when provisioningBlueprintFile and data are set
    set:
      newtInstances:
        - name: test-prov-blueprint
          enabled: true
          provisioningBlueprintFile: /etc/newt/provisioning-blueprint.yaml
          provisioningBlueprintData: |
            version: 1
            routes: []
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: "RELEASE-NAME-newt-test-prov-blueprint-provisioning-blueprint"
      - equal:
          path: data["provisioning-blueprint.yaml"]
          value: |
            version: 1
            routes: []

  - it: renders ConfigMap with correct filename extracted from path
    set:
      newtInstances:
        - name: test-filename-extract
          enabled: true
          provisioningBlueprintFile: /etc/newt/my-custom-blueprint.yaml
          provisioningBlueprintData: |
            version: 2
            routes:
              - 10.0.0.0/24
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: data["my-custom-blueprint.yaml"]
          value: |
            version: 2
            routes:
              - 10.0.0.0/24

  - it: does not render ConfigMap when provisioningBlueprintFile is not set
    set:
      newtInstances:
        - name: test-no-prov-blueprint
          enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: renders ConfigMap with placeholder comment when provisioningBlueprintFile is set but provisioningBlueprintData is empty (validation failure happens at deployment level)
    set:
      newtInstances:
        - name: test-prov-blueprint-missing-data
          enabled: true
          provisioningBlueprintFile: /etc/newt/provisioning-blueprint.yaml
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: "RELEASE-NAME-newt-test-prov-blueprint-missing-data-provisioning-blueprint"
      - exists:
          path: 'data["provisioning-blueprint.yaml"]'
