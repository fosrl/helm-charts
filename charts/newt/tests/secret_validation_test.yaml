suite: Secret validation
templates:
  - templates/secret-newt.yaml
tests:
  - it: renders secret when secret is provided inline with full credentials
    set:
      newtInstances:
        - name: inline-secret
          enabled: true
          pangolinEndpoint: "https://pangolin.example.com"
          id: my-instance-id
          secret: my-secret-value
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: data.NEWT_SECRET
          value: "bXktc2VjcmV0LXZhbHVl"
      - equal:
          path: data.PANGOLIN_ENDPOINT
          value: "aHR0cHM6Ly9wYW5nb2xpbi5leGFtcGxlLmNvbQ=="
      - equal:
          path: data.NEWT_ID
          value: "bXktaW5zdGFuY2UtaWQ="

  - it: does NOT render secret when existingSecretName is provided (external secret)
    set:
      newtInstances:
        - name: existing-secret
          enabled: true
          auth:
            existingSecretName: my-existing-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: renders secret when mtls enabled with inline p12
    set:
      newtInstances:
        - name: mtls-secret
          enabled: true
          mtls:
            enabled: true
            p12Base64: cGtlMTIz
    asserts:
      - isKind:
          of: Secret

  - it: renders secret when mtls enabled without secretName
    set:
      newtInstances:
        - name: mtls-secret
          enabled: true
          mtls:
            enabled: true
    asserts:
      - isKind:
          of: Secret

  - it: fails when both inline credentials and external auth are provided
    set:
      newtInstances:
        - name: dual-auth
          enabled: true
          pangolinEndpoint: "https://pangolin.example.com"
          id: my-id
          secret: my-inline-secret
          auth:
            existingSecretName: my-existing-secret
    asserts:
      - failedTemplate:
          errorPattern: "Cannot specify both inline credentials.*and external auth"

  - it: fails when no credentials are provided
    set:
      newtInstances:
        - name: no-credentials
          enabled: true
    asserts:
      - failedTemplate:
          errorPattern: "newtInstances: Credentials required"

  - it: adds warning annotation when inline credentials create a Secret
    set:
      newtInstances:
        - name: warn-inline-secret
          enabled: true
          pangolinEndpoint: "https://pangolin.example.com"
          id: my-id
          secret: my-secret-value
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.annotations["newt.helm.warning"]
          value: "Inline secrets detected. Use auth.existingSecretName for production deployments to avoid secrets in values."

  - it: renders no secret when envVarsDirect is enabled
    set:
      newtInstances:
        - name: envvars-direct
          enabled: true
          pangolinEndpoint: "https://pangolin.example.com"
          id: my-id
          secret: my-secret
          auth:
            envVarsDirect: true
    asserts:
      - hasDocuments:
          count: 0

  - it: fails when envVarsDirect is enabled but inline credentials missing
    set:
      newtInstances:
        - name: envvars-missing-creds
          enabled: true
          auth:
            envVarsDirect: true
    asserts:
      - failedTemplate:
          errorPattern: "auth\.envVarsDirect is enabled but inline credentials"

  - it: renders Secret with custom auth key names
    set:
      newtInstances:
        - name: custom-keys
          enabled: true
          pangolinEndpoint: "https://pangolin.example.com"
          id: my-id
          secret: my-secret-value
          auth:
            keys:
              endpointKey: CUSTOM_ENDPOINT
              idKey: CUSTOM_ID
              secretKey: CUSTOM_SECRET
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: data.CUSTOM_ENDPOINT
          value: "aHR0cHM6Ly9wYW5nb2xpbi5leGFtcGxlLmNvbQ=="
      - equal:
          path: data.CUSTOM_ID
          value: "bXktaWQ="
      - equal:
          path: data.CUSTOM_SECRET
          value: "bXktc2VjcmV0LXZhbHVl"

  - it: fails when createSecret is false for inline credentials without another auth mode
    set:
      newtInstances:
        - name: no-secret-mode
          enabled: true
          pangolinEndpoint: "https://pangolin.example.com"
          id: my-id
          secret: my-secret-value
          auth:
            createSecret: false
            envVarsDirect: false
    asserts:
      - failedTemplate:
          errorPattern: "newtInstances: Credentials required"
