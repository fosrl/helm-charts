suite: Deployment validation
templates:
  - templates/deployment.yaml
tests:
  - it: fails when provisioningBlueprintFile is set but provisioningBlueprintData is empty
    set:
      newtInstances:
        - name: test-missing-prov-blueprint-data
          enabled: true
          provisioningBlueprintFile: /etc/newt/provisioning-blueprint.yaml
    asserts:
      - failedTemplate:
          errorPattern: "provisioningBlueprintFile is set but provisioningBlueprintData is empty"


  - it: fails when configPersistence.type is persistentVolumeClaim but existingClaim is empty
    set:
      newtInstances:
        - name: test-pvc-missing-claim
          enabled: true
          configPersistence:
            enabled: true
            type: persistentVolumeClaim
            existingClaim: ""
            mountPath: /var/lib/newt
            fileName: config.json
    asserts:
      - failedTemplate:
          errorPattern: "configPersistence\\.type is persistentVolumeClaim but existingClaim is empty"

  # Note: invalid configPersistence.type is caught by JSON schema validation (enum constraint),
  # which occurs before template rendering. This cannot be tested with failedTemplate.
