{{- $root := . -}}
{{- range $idx, $inst := .Values.newtInstances }}
{{- $inst := $inst | default dict -}}
{{- $instMtls := (default (dict) $inst.mtls) -}}
{{- $auth := (default (dict) $inst.auth) -}}
{{- $authKeys := (default (dict) $auth.keys) -}}
{{- $existingSecretName := get $auth "existingSecretName" -}}
{{- $createSecret := true -}}
{{- if hasKey $auth "createSecret" }}{{- $createSecret = (index $auth "createSecret") -}}{{- end -}}
{{- $envVarsDirect := (default false $auth.envVarsDirect) -}}

{{- $endpointKey := default "PANGOLIN_ENDPOINT" (get $authKeys "endpointKey") -}}
{{- $idKey := default "NEWT_ID" (get $authKeys "idKey") -}}
{{- $secretKey := default "NEWT_SECRET" (get $authKeys "secretKey") -}}

{{- $hasAnyInlineCredential := or $inst.pangolinEndpoint $inst.id $inst.secret -}}
{{- $hasInlineCredentials := and $inst.pangolinEndpoint $inst.id $inst.secret -}}
{{- $hasExternalAuth := $existingSecretName -}}
{{- $hasProvisioning := $inst.provisioningKey -}}
{{- $hasMtlsInline := and $instMtls.enabled (or (not $instMtls.secretName) $instMtls.p12Base64) -}}
{{- $hasMtlsExternal := and $instMtls.enabled $instMtls.secretName -}}

{{- if and $hasAnyInlineCredential (not $hasInlineCredentials) }}
{{- fail "newtInstances: Inline credentials require pangolinEndpoint, id, and secret to be set together." }}
{{- end }}

{{- if and $hasInlineCredentials $hasExternalAuth }}
{{- fail "newtInstances: Cannot specify both inline credentials (pangolinEndpoint/id/secret) and external auth (newtInstances[].auth.existingSecretName). Choose one authentication method." }}
{{- end }}

{{- if and $envVarsDirect (not $hasInlineCredentials) }}
{{- fail "newtInstances: auth.envVarsDirect is enabled but inline credentials (pangolinEndpoint/id/secret) are not provided." }}
{{- end }}

{{- $hasValidCredentials := false -}}
{{- if $hasExternalAuth }}{{- $hasValidCredentials = true -}}{{- end }}
{{- if $hasProvisioning }}{{- $hasValidCredentials = true -}}{{- end }}
{{- if $hasMtlsInline }}{{- $hasValidCredentials = true -}}{{- end }}
{{- if $hasMtlsExternal }}{{- $hasValidCredentials = true -}}{{- end }}
{{- if and $createSecret $hasInlineCredentials }}{{- $hasValidCredentials = true -}}{{- end }}
{{- if and $envVarsDirect $hasInlineCredentials }}{{- $hasValidCredentials = true -}}{{- end }}

{{- if and $inst.enabled (not $hasValidCredentials) }}
{{- fail "newtInstances: Credentials required. Either set inline credentials (pangolinEndpoint/id/secret), newtInstances[].auth.existingSecretName, newtInstances[].provisioningKey, enable auth.envVarsDirect with inline credentials, or provide mtls.secretName/mtls.p12Base64." }}
{{- end }}

{{- if $inst.enabled }}
{{- $shouldCreateSecret := false -}}
{{- if and $createSecret $hasInlineCredentials (not $hasExternalAuth) (not $envVarsDirect) }}
{{- $shouldCreateSecret = true -}}
{{- end }}

{{- if or $shouldCreateSecret $hasMtlsInline }}
{{- $nsName := include "newt.effectiveNamespace" (dict "root" $root "inst" $inst) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "newt.instance.fullname" (dict "root" $root "inst" $inst) }}
  namespace: {{ $nsName }}
  labels:
    {{- include "newt.labels" $root | nindent 4 }}
    newt.instance: {{ $inst.name }}
  {{- $annots := dict -}}
  {{- range $k, $v := (default dict $root.Values.global.additionalAnnotations) }}
  {{- $_ := set $annots $k $v }}
  {{- end }}
  {{- if $shouldCreateSecret }}
  {{- $_ := set $annots "newt.helm.warning" "Inline secrets detected. Use auth.existingSecretName for production deployments to avoid secrets in values." }}
  {{- end }}
  {{- if gt (len $annots) 0 }}
  annotations:
    {{- toYaml $annots | nindent 4 }}
  {{- end }}
type: Opaque
data:
  {{- if $shouldCreateSecret }}
  {{ $endpointKey }}: {{ $inst.pangolinEndpoint | b64enc | quote }}
  {{ $idKey }}: {{ $inst.id | b64enc | quote }}
  {{ $secretKey }}: {{ $inst.secret | b64enc | quote }}
  {{- end }}
  {{- if $hasMtlsInline }}
  client.p12: {{ $instMtls.p12Base64 | default "" | quote }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
