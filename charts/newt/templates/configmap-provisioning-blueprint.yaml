{{- $root := . -}}
{{- range $idx, $inst := .Values.newtInstances }}
{{- $inst := $inst | default dict -}}
{{- if and $inst.enabled $inst.provisioningBlueprintFile }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "newt.instance.fullname" (dict "root" $root "inst" $inst) }}-provisioning-blueprint
  labels:
    {{- include "newt.labels" $root | nindent 4 }}
    newt.instance: {{ $inst.name }}
  {{- with $root.Values.global.additionalAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  {{- /* Extract filename from path */ -}}
  {{- $filename := $inst.provisioningBlueprintFile | base -}}
  {{- $data := $inst.provisioningBlueprintData -}}
  {{- if $data }}
  {{ $filename }}: |
    {{- $data | nindent 4 }}
  {{- else }}
  {{ $filename }}: |
    # Provisioning blueprint configuration not provided inline.
  {{- end }}
{{- end }}
{{- end }}
