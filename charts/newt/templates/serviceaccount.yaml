{{- $root := . -}}
{{- $serviceAccounts := dict -}}

{{- /* Build namespaced global ServiceAccounts (one per effective namespace). */ -}}
{{- if $root.Values.serviceAccount.create }}
{{- range $idx, $inst := $root.Values.newtInstances }}
{{- if $inst.enabled }}
{{- $nsName := include "newt.effectiveNamespace" (dict "root" $root "inst" $inst) -}}
{{- $saName := include "newt.serviceAccountName" $root -}}
{{- $key := printf "%s/%s" $nsName $saName -}}
{{- if not (hasKey $serviceAccounts $key) }}
{{- $_ := set $serviceAccounts $key (dict
      "namespace" $nsName
      "name" $saName
      "annotations" (default dict $root.Values.serviceAccount.annotations)
      "automount" (default false $root.Values.serviceAccount.automountServiceAccountToken)
      "instanceName" "") -}}
{{- end }}
{{- end }}
{{- end }}
{{- end }}

{{- /* Build dedicated per-instance ServiceAccounts when explicitly enabled. */ -}}
{{- range $idx, $inst := $root.Values.newtInstances }}
{{- if $inst.enabled }}
{{- $canOverride := (default false $inst.allowGlobalOverride) -}}
{{- $instServiceAccount := (default dict $inst.serviceAccount) -}}
{{- $instCreateRaw := (get $instServiceAccount "create") -}}
{{- $instCreate := false -}}
{{- if kindIs "bool" $instCreateRaw -}}
{{- $instCreate = $instCreateRaw -}}
{{- else if kindIs "string" $instCreateRaw -}}
{{- $instCreate = eq (lower $instCreateRaw) "true" -}}
{{- end -}}
{{- if and $canOverride $instCreate }}
{{- $nsName := include "newt.effectiveNamespace" (dict "root" $root "inst" $inst) -}}
{{- $saName := include "newt.instance.serviceAccountName" (dict "root" $root "inst" $inst) -}}
{{- $key := printf "%s/%s" $nsName $saName -}}
{{- $anns := dict -}}
{{- range $k, $v := (default dict $root.Values.serviceAccount.annotations) }}
{{- $_ := set $anns $k $v -}}
{{- end -}}
{{- range $k, $v := (default dict (get $instServiceAccount "annotations")) }}
{{- $_ := set $anns $k $v -}}
{{- end -}}
{{- $_ := set $serviceAccounts $key (dict
      "namespace" $nsName
      "name" $saName
      "annotations" $anns
      "automount" (default false (get $instServiceAccount "automountServiceAccountToken"))
      "instanceName" $inst.name) -}}
{{- end }}
{{- end }}
{{- end }}

{{- range $key, $sa := $serviceAccounts }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $sa.name }}
  namespace: {{ $sa.namespace }}
  labels:
    {{- include "newt.labels" $root | nindent 4 }}
    {{- if $sa.instanceName }}
    newt.instance: {{ $sa.instanceName }}
    {{- end }}
  {{- if gt (len $sa.annotations) 0 }}
  annotations:
    {{- toYaml $sa.annotations | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ $sa.automount }}
{{- end }}
