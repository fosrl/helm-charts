# Example: Single Pod standalone mode (trade-off profile)
#
# Topology: deployment.type=standalone + deployment.mode=single
# Database:  database.mode=cloudnativepg
#
# This profile demonstrates single-mode standalone behavior where Pangolin +
# Gerbil + Traefik run in one Pod. It is convenient for labs, but less
# fault-tolerant and less recommended for production than controller/multi mode.

deployment:
  type: standalone
  mode: single

namespace:
  create: true
  name: pangolin-single
  podSecurity:
    enforce: privileged
    warn: baseline
    audit: baseline

database:
  mode: cloudnativepg
  cloudnativepg:
    cluster:
      name: pangolin-db

cnpg-operator:
  enabled: false
cnpg-cluster:
  enabled: true
  fullnameOverride: pangolin-db
  type: postgresql
  mode: standalone
  cluster:
    instances: 1
    storage:
      size: 8Gi

pangolin:
  config:
    app:
      dashboard_url: "https://pangolin.yourdomain.example"
    gerbil:
      base_endpoint: "vpn.yourdomain.example"

gerbil:
  enabled: true
  persistence:
    enabled: true

traefik:
  enabled: true
  persistence:
    enabled: true
  config:
    letsencryptEmail: "ops@yourdomain.example"
    dynamicRouters:
      host: "pangolin.yourdomain.example"
