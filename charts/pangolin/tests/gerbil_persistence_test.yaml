suite: Gerbil persistence rendering
templates:
  - templates/pvc-gerbil.yaml
  - templates/deployment-gerbil.yaml
tests:
  - it: renders Gerbil PVC by default (persistence enabled)
    template: templates/pvc-gerbil.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: PersistentVolumeClaim
      - equal:
          path: metadata.name
          value: RELEASE-NAME-pangolin-gerbil-config
      - equal:
          path: spec.accessModes[0]
          value: ReadWriteOnce
      - equal:
          path: spec.resources.requests.storage
          value: 1Gi
      - notExists:
          path: spec.storageClassName

  - it: renders Gerbil deployment with PVC volume by default
    template: templates/deployment-gerbil.yaml
    asserts:
      - equal:
          path: spec.template.spec.volumes[0].persistentVolumeClaim.claimName
          value: RELEASE-NAME-pangolin-gerbil-config
      - notExists:
          path: spec.template.spec.volumes[0].emptyDir

  - it: uses emptyDir when persistence disabled
    template: templates/deployment-gerbil.yaml
    set:
      gerbil.persistence.enabled: false
    asserts:
      - equal:
          path: spec.template.spec.volumes[0].emptyDir
          value: {}
      - notExists:
          path: spec.template.spec.volumes[0].persistentVolumeClaim

  - it: does not render PVC when persistence disabled
    template: templates/pvc-gerbil.yaml
    set:
      gerbil.persistence.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: does not render PVC when existingClaim is set
    template: templates/pvc-gerbil.yaml
    set:
      gerbil.persistence.existingClaim: my-gerbil-pvc
    asserts:
      - hasDocuments:
          count: 0

  - it: mounts existingClaim when set (no new PVC)
    template: templates/deployment-gerbil.yaml
    set:
      gerbil.persistence.existingClaim: my-gerbil-pvc
    asserts:
      - equal:
          path: spec.template.spec.volumes[0].persistentVolumeClaim.claimName
          value: my-gerbil-pvc

  - it: renders storageClassName when storageClass is set
    template: templates/pvc-gerbil.yaml
    set:
      gerbil.persistence.storageClass: fast-ssd
    asserts:
      - equal:
          path: spec.storageClassName
          value: fast-ssd

  - it: does not render storageClassName when storageClass is empty
    template: templates/pvc-gerbil.yaml
    asserts:
      - notExists:
          path: spec.storageClassName

  - it: uses global.storageClass when gerbil storageClass is empty
    template: templates/pvc-gerbil.yaml
    set:
      global.storageClass: standard
    asserts:
      - equal:
          path: spec.storageClassName
          value: standard

  - it: gerbil storageClass takes priority over global.storageClass
    template: templates/pvc-gerbil.yaml
    set:
      global.storageClass: standard
      gerbil.persistence.storageClass: premium-ssd
    asserts:
      - equal:
          path: spec.storageClassName
          value: premium-ssd

  - it: renders custom PVC size when set
    template: templates/pvc-gerbil.yaml
    set:
      gerbil.persistence.size: 5Gi
    asserts:
      - equal:
          path: spec.resources.requests.storage
          value: 5Gi

  - it: renders PVC annotations when set
    template: templates/pvc-gerbil.yaml
    set:
      gerbil.persistence.annotations.my-annotation: my-value
    asserts:
      - equal:
          path: metadata.annotations["my-annotation"]
          value: my-value
