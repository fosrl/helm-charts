suite: external database connection secret rendering
templates:
  - templates/secret-db-connection.yaml
  - templates/deployment-pangolin.yaml
tests:
  - it: renders external database connection secret from full connectionString
    set:
      database.mode: external
      database.external.generatedSecret.create: true
      database.external.generatedSecret.connectionString: "postgresql://user:pass@host:5432/db"
    template: templates/secret-db-connection.yaml
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: stringData.connectionString
          value: "postgresql://user:pass@host:5432/db"

  - it: defaults external generated connection sslMode to disable when not explicitly set
    set:
      database.mode: external
      database.external.generatedSecret.create: true
      database.external.generatedSecret.host: "db.example.com"
      database.external.generatedSecret.port: 5432
      database.external.generatedSecret.database: "pangolin"
      database.external.generatedSecret.username: "pangolin"
      database.external.generatedSecret.password: "s3cr3t"
    template: templates/secret-db-connection.yaml
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: stringData.connectionString
          value: "postgresql://pangolin:s3cr3t@db.example.com:5432/pangolin?sslmode=disable"

  - it: respects explicit external generated connection sslMode override
    set:
      database.mode: external
      database.external.generatedSecret.create: true
      database.external.generatedSecret.host: "db.example.com"
      database.external.generatedSecret.port: 5432
      database.external.generatedSecret.database: "pangolin"
      database.external.generatedSecret.username: "pangolin"
      database.external.generatedSecret.password: "s3cr3t"
      database.external.generatedSecret.sslMode: "require"
    template: templates/secret-db-connection.yaml
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: stringData.connectionString
          value: "postgresql://pangolin:s3cr3t@db.example.com:5432/pangolin?sslmode=require"

  - it: external database secret name defaults to fullname-db-connection
    set:
      database.mode: external
      database.external.generatedSecret.create: true
      database.external.generatedSecret.connectionString: "postgresql://u:p@h:5432/db"
    template: templates/secret-db-connection.yaml
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-pangolin-db-connection

  - it: external database secret name can be overridden via generatedSecret.name
    set:
      database.mode: external
      database.external.generatedSecret.create: true
      database.external.generatedSecret.name: my-ext-db-secret
      database.external.generatedSecret.connectionString: "postgresql://u:p@h:5432/db"
    template: templates/secret-db-connection.yaml
    asserts:
      - equal:
          path: metadata.name
          value: my-ext-db-secret

  - it: does not render external DB connection secret when create=false
    set:
      database.mode: external
      database.external.generatedSecret.create: false
      database.connection.existingSecretName: my-existing-secret
    template: templates/secret-db-connection.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: does not render external DB connection secret when existing unified connection secret is provided
    set:
      database.mode: external
      database.connection.existingSecretName: my-existing-secret
      database.external.generatedSecret.create: true
      database.external.generatedSecret.connectionString: "postgresql://u:p@h:5432/db?sslmode=require"
    template: templates/secret-db-connection.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: deployment references auto-derived name when external create=true
    set:
      database.mode: external
      database.external.generatedSecret.create: true
      database.external.generatedSecret.connectionString: "postgresql://u:p@h:5432/db"
    template: templates/deployment-pangolin.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[1].valueFrom.secretKeyRef.name
          value: RELEASE-NAME-pangolin-db-connection
      - equal:
          path: spec.template.spec.containers[0].env[1].valueFrom.secretKeyRef.key
          value: connectionString

  - it: deployment references named secret when external generatedSecret.name is set
    set:
      database.mode: external
      database.external.generatedSecret.create: true
      database.external.generatedSecret.name: my-ext-db-secret
      database.external.generatedSecret.connectionString: "postgresql://u:p@h:5432/db"
    template: templates/deployment-pangolin.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[1].valueFrom.secretKeyRef.name
          value: my-ext-db-secret
