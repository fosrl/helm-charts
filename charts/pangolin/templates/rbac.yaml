{{- $fullname := include "pangolin.fullname" . -}}
{{- $namespace := include "pangolin.namespace" . -}}
{{- $renderController := and .Values.controller.enabled (eq .Values.deployment.type "controller") -}}
{{- if and .Values.rbac.create $renderController }}
{{- $saName := include "pangolin.serviceAccountName.controller" . -}}
{{- $targetNamespace := coalesce .Values.controller.config.targetNamespace .Values.deployment.traefikNamespace $namespace -}}
{{- $rbacLabels := .Values.controller.rbac.labels | default dict -}}
{{- $rbacAnns := mergeOverwrite (dict) (include "pangolin.global.commonAnnotations" . | fromYaml) (include "pangolin.component.commonAnnotations" (dict "root" . "component" "controller") | fromYaml) (.Values.controller.rbac.annotations | default dict) -}}
{{- $leaderElectionConfig := get .Values.controller "leaderElection" | default dict -}}
{{- $leaderElectionEnabled := .Values.controller.config.enableLeaderElection -}}
{{- if hasKey $leaderElectionConfig "enabled" -}}
{{- $leaderElectionEnabled = get $leaderElectionConfig "enabled" -}}
{{- end -}}
{{- $rbacRules := list
  (dict "apiGroups" (list "") "resources" (list "events") "verbs" (list "create" "patch" "update"))
  (dict "apiGroups" (list "") "resources" (list "services" "endpoints") "verbs" (list "get" "list" "watch" "create" "update" "patch" "delete"))
  (dict "apiGroups" (list "discovery.k8s.io") "resources" (list "endpointslices") "verbs" (list "get" "list" "watch" "create" "update" "patch" "delete"))
  (dict "apiGroups" (list "traefik.io") "resources" (list "ingressroutes" "ingressroutetcps" "ingressrouteudps" "middlewares" "middlewaretcps" "traefikservices" "serverstransports" "serverstransporttcps" "tlsoptions" "tlsstores") "verbs" (list "get" "list" "watch" "create" "update" "patch" "delete"))
-}}
{{- if $leaderElectionEnabled -}}
{{- $rbacRules = prepend $rbacRules (dict "apiGroups" (list "coordination.k8s.io") "resources" (list "leases") "verbs" (list "get" "list" "watch" "create" "update" "patch")) -}}
{{- end -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $fullname }}
  namespace: {{ $namespace }}
  labels:
    {{- include "pangolin.labels" . | nindent 4 }}
    {{- include "pangolin.component.commonLabels" (dict "root" . "component" "controller") | nindent 4 }}
    {{- include "pangolin.renderNonSelectorLabels" (dict "labels" $rbacLabels) | nindent 4 }}
  {{- if gt (len $rbacAnns) 0 }}
  annotations:
    {{- toYaml $rbacAnns | nindent 4 }}
  {{- end }}
rules:
{{ toYaml $rbacRules | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $fullname }}
  namespace: {{ $namespace }}
  labels:
    {{- include "pangolin.labels" . | nindent 4 }}
    {{- include "pangolin.component.commonLabels" (dict "root" . "component" "controller") | nindent 4 }}
    {{- include "pangolin.renderNonSelectorLabels" (dict "labels" $rbacLabels) | nindent 4 }}
  {{- if gt (len $rbacAnns) 0 }}
  annotations:
    {{- toYaml $rbacAnns | nindent 4 }}
  {{- end }}
subjects:
  - kind: ServiceAccount
    name: {{ $saName }}
    namespace: {{ $namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $fullname }}
{{- if ne $targetNamespace $namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $fullname }}
  namespace: {{ $targetNamespace }}
  labels:
    {{- include "pangolin.labels" . | nindent 4 }}
    {{- include "pangolin.component.commonLabels" (dict "root" . "component" "controller") | nindent 4 }}
    {{- include "pangolin.renderNonSelectorLabels" (dict "labels" $rbacLabels) | nindent 4 }}
  {{- if gt (len $rbacAnns) 0 }}
  annotations:
    {{- toYaml $rbacAnns | nindent 4 }}
  {{- end }}
rules:
{{ toYaml $rbacRules | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $fullname }}
  namespace: {{ $targetNamespace }}
  labels:
    {{- include "pangolin.labels" . | nindent 4 }}
    {{- include "pangolin.component.commonLabels" (dict "root" . "component" "controller") | nindent 4 }}
    {{- include "pangolin.renderNonSelectorLabels" (dict "labels" $rbacLabels) | nindent 4 }}
  {{- if gt (len $rbacAnns) 0 }}
  annotations:
    {{- toYaml $rbacAnns | nindent 4 }}
  {{- end }}
subjects:
  - kind: ServiceAccount
    name: {{ $saName }}
    namespace: {{ $namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $fullname }}
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ printf "%s-cluster" $fullname }}
  labels:
    {{- include "pangolin.labels" . | nindent 4 }}
    {{- include "pangolin.component.commonLabels" (dict "root" . "component" "controller") | nindent 4 }}
    {{- include "pangolin.renderNonSelectorLabels" (dict "labels" $rbacLabels) | nindent 4 }}
  {{- if gt (len $rbacAnns) 0 }}
  annotations:
    {{- toYaml $rbacAnns | nindent 4 }}
  {{- end }}
rules:
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingressclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ printf "%s-cluster" $fullname }}
  labels:
    {{- include "pangolin.labels" . | nindent 4 }}
    {{- include "pangolin.component.commonLabels" (dict "root" . "component" "controller") | nindent 4 }}
    {{- include "pangolin.renderNonSelectorLabels" (dict "labels" $rbacLabels) | nindent 4 }}
  {{- if gt (len $rbacAnns) 0 }}
  annotations:
    {{- toYaml $rbacAnns | nindent 4 }}
  {{- end }}
subjects:
  - kind: ServiceAccount
    name: {{ $saName }}
    namespace: {{ $namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ printf "%s-cluster" $fullname }}
{{- end }}
