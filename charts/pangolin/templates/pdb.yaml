    {{- include "pangolin.labels" $root | nindent 4 }}
    {{- range $k, $v := ($pdb.labels | default dict) }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
  {{- if gt (len $annotations) 0 }}
  annotations:
    {{- toYaml $annotations | nindent 4 }}
  {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "pangolin.controller.selectorLabels" $root | nindent 6 }}
  {{- if $maxUnavailable }}
  maxUnavailable: {{ $maxUnavailable }}
  {{- else }}
  minAvailable: {{ $minAvailable }}
  {{- end }}
{{- end }}

