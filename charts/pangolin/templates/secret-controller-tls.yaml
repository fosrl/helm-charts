{{- $tls := .Values.controller.tls | default dict -}}
{{- $tlsEnabled := (default false (get $tls "enabled")) -}}
{{- if and .Values.controller.enabled (eq .Values.deployment.type "controller") $tlsEnabled (not (.Values.controller.tls.existingSecretName | default "")) }}
{{- $root := . -}}
{{- $namespace := include "pangolin.namespace" $root -}}
{{- $secretName := include "pangolin.controller.tlsSecretName" $root -}}
{{- $metaAnns := mergeOverwrite (dict) (include "pangolin.global.commonAnnotations" $root | fromYaml) (include "pangolin.component.commonAnnotations" (dict "root" $root "component" "controller") | fromYaml) -}}
{{- $existing := lookup "v1" "Secret" $namespace $secretName -}}
{{- $existingCrt := "" -}}
{{- $existingKey := "" -}}
{{- if and $existing $existing.data -}}
  {{- if hasKey $existing.data "tls.crt" -}}
    {{- $existingCrt = index $existing.data "tls.crt" -}}
  {{- end -}}
  {{- if hasKey $existing.data "tls.key" -}}
    {{- $existingKey = index $existing.data "tls.key" -}}
  {{- end -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "pangolin.labels" . | nindent 4 }}
    {{- include "pangolin.component.commonLabels" (dict "root" . "component" "controller") | nindent 4 }}
  {{- if gt (len $metaAnns) 0 }}
  annotations:
    {{- toYaml $metaAnns | nindent 4 }}
  {{- end }}
type: kubernetes.io/tls
data:
  {{ if and $existingCrt $existingKey }}
  tls.crt: {{ $existingCrt | quote }}
  tls.key: {{ $existingKey | quote }}
  {{ else }}
  {{- $svcName := include "pangolin.controller.fullname" $root -}}
  {{- $dnsNames := list $svcName (printf "%s.%s" $svcName $namespace) (printf "%s.%s.svc" $svcName $namespace) (printf "%s.%s.svc.cluster.local" $svcName $namespace) -}}
  {{- $cert := genSelfSignedCert (printf "%s-controller" $svcName) (list "127.0.0.1") $dnsNames 3650 -}}
  tls.crt: {{ $cert.Cert | b64enc | quote }}
  tls.key: {{ $cert.Key | b64enc | quote }}
  {{ end }}
{{- end }}
