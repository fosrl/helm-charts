{{- if and .Values.controller.enabled (eq .Values.deployment.type "controller") (eq .Values.deployment.mode "multi") }}
{{- $root := . -}}
{{- $ctrl := .Values.controller -}}
{{- $tls := $ctrl.tls | default dict -}}
{{- $tlsEnabled := (default false $tls.enabled) -}}
{{- $fullname := include "pangolin.controller.fullname" . -}}
{{- $namespace := include "pangolin.namespace" . -}}
{{- $saName := include "pangolin.serviceAccountName.controller" . -}}
{{- $replicas := $ctrl.replicaCount | default 1 -}}
{{- $workloadType := $ctrl.workloadType | default "Deployment" -}}
{{- $controllerWait := (include "pangolin.wait.config" (dict "root" $root "override" ($ctrl.waitForPangolin | default dict)) | fromYaml) | default dict -}}
{{- $controllerWaitUserEnabled := ternary (index $controllerWait "enabled") true (hasKey $controllerWait "enabled") -}}
{{- $controllerConfigEndpoint := include "pangolin.controller.configEndpoint" $root -}}
{{- $depMetaAnns := mergeOverwrite (dict) (include "pangolin.global.commonAnnotations" $root | fromYaml) (include "pangolin.component.commonAnnotations" (dict "root" $root "component" "controller") | fromYaml) ($ctrl.deployment.annotations | default dict) -}}
{{- $podMetaAnns := mergeOverwrite (dict) (include "pangolin.global.commonAnnotations" $root | fromYaml) ($root.Values.global.additionalPodAnnotations | default dict) (include "pangolin.component.commonAnnotations" (dict "root" $root "component" "controller") | fromYaml) ($ctrl.deployment.podAnnotations | default dict) -}}
apiVersion: apps/v1
kind: {{ $workloadType }}
metadata:
  name: {{ $fullname }}
  namespace: {{ $namespace }}
  labels:
    {{- include "pangolin.labels" $root | nindent 4 }}
    {{- include "pangolin.component.commonLabels" (dict "root" $root "component" "controller") | nindent 4 }}
    {{- include "pangolin.renderNonSelectorLabels" (dict "labels" ($ctrl.deployment.labels | default dict)) | nindent 4 }}
    app.kubernetes.io/component: controller
  {{- if gt (len $depMetaAnns) 0 }}
  annotations:
    {{- toYaml $depMetaAnns | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ $replicas }}
  revisionHistoryLimit: {{ $root.Values.global.revisionHistoryLimit | default 10 }}
  {{- if eq $workloadType "StatefulSet" }}
  serviceName: {{ $fullname }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "pangolin.controller.selectorLabels" $root | nindent 6 }}
  {{- if $root.Values.runtime.minReadySeconds }}
  minReadySeconds: {{ $root.Values.runtime.minReadySeconds }}
  {{- end }}
  {{- with $root.Values.runtime.updateStrategy }}
  {{- if eq $workloadType "StatefulSet" }}
  updateStrategy:
    {{- toYaml . | nindent 4 }}
  {{- else }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- end }}
  template:
    metadata:
      {{- $parent := $root }}
      labels:
        {{- include "pangolin.labels" $root | nindent 8 }}
        {{- include "pangolin.component.commonLabels" (dict "root" $root "component" "controller") | nindent 8 }}
        {{- include "pangolin.renderNonSelectorLabels" (dict "labels" ($root.Values.global.additionalPodLabels | default dict)) | nindent 8 }}
        {{- include "pangolin.renderNonSelectorLabels" (dict "labels" ($ctrl.deployment.podLabels | default dict)) | nindent 8 }}
        app.kubernetes.io/component: controller
      {{- if gt (len $podMetaAnns) 0 }}
      annotations:
        {{- toYaml $podMetaAnns | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ $saName }}
      automountServiceAccountToken: {{ .Values.serviceAccount.controller.automountServiceAccountToken }}
      terminationGracePeriodSeconds: {{ $root.Values.runtime.terminationGracePeriodSeconds | default 30 }}
      {{- if $root.Values.global.priorityClassName }}
      priorityClassName: {{ $root.Values.global.priorityClassName }}
      {{- end }}
      {{- $ips := include "pangolin.imagePullSecrets" $root }}
      {{- if $ips }}
      {{- $ips | nindent 6 }}
      {{- end }}
      {{- if $root.Values.highAvailability.podAntiAffinity.enabled }}
      affinity:
        {{- if eq $root.Values.highAvailability.podAntiAffinity.type "hard" }}
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  {{- include "pangolin.controller.selectorLabels" $root | nindent 14 }}
              topologyKey: {{ $root.Values.highAvailability.podAntiAffinity.topologyKey }}
          {{- else }}
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: {{ $root.Values.highAvailability.podAntiAffinity.weight }}
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "pangolin.controller.selectorLabels" $root | nindent 16 }}
                topologyKey: {{ $root.Values.highAvailability.podAntiAffinity.topologyKey }}
          {{- end }}
      {{- else if $root.Values.global.affinity }}
      affinity:
        {{- toYaml $root.Values.global.affinity | nindent 8 }}
      {{- end }}
      {{- if $root.Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml $root.Values.global.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if $root.Values.global.tolerations }}
      tolerations:
        {{- toYaml $root.Values.global.tolerations | nindent 8 }}
      {{- end }}
      {{- if $root.Values.global.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml $root.Values.global.topologySpreadConstraints | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml (deepCopy $root.Values.global.podSecurityContext) | nindent 8 }}
      {{- if $controllerWaitUserEnabled }}
      initContainers:
        - name: wait-for-pangolin-config
          image: {{ include "pangolin.wait.image" ($controllerWait.image | default dict) | quote }}
          imagePullPolicy: {{ $controllerWait.image.pullPolicy | default "IfNotPresent" }}
          command:
            - /bin/sh
            - -c
            - |
              ENDPOINT={{ $controllerConfigEndpoint | quote }}
              TIMEOUT_SECONDS={{ $controllerWait.timeoutSeconds | default 300 }}
              INTERVAL_SECONDS={{ $controllerWait.intervalSeconds | default 5 }}
              STABLE_SECONDS={{ $controllerWait.stableSeconds | default 30 }}
              CONFIG_TLS_SKIP_VERIFY={{ ternary "true" "false" ($root.Values.controller.config.configTlsSkipVerify | default false) | quote }}
              elapsed=0
              stable=0
              while [ "${elapsed}" -lt "${TIMEOUT_SECONDS}" ]; do
                ready="false"
                if [ "${CONFIG_TLS_SKIP_VERIFY}" = "true" ]; then
                  if curl -k -fsS --max-time 5 "${ENDPOINT}" >/dev/null 2>&1; then
                    ready="true"
                  fi
                elif [ -f /etc/pangolin/tls/ca.crt ]; then
                  if curl --cacert /etc/pangolin/tls/ca.crt -fsS --max-time 5 "${ENDPOINT}" >/dev/null 2>&1; then
                    ready="true"
                  fi
                elif curl -fsS --max-time 5 "${ENDPOINT}" >/dev/null 2>&1; then
                  ready="true"
                fi
                if [ "${ready}" = "true" ]; then
                  stable=$((stable + INTERVAL_SECONDS))
                  echo "Pangolin Traefik config endpoint ready for ${stable}/${STABLE_SECONDS}s"
                  if [ "${stable}" -ge "${STABLE_SECONDS}" ]; then
                    exit 0
                  fi
                else
                  stable=0
                  echo "Pangolin Traefik config endpoint not ready yet"
                fi
                sleep "${INTERVAL_SECONDS}"
                elapsed=$((elapsed + INTERVAL_SECONDS))
              done
              echo "Timed out waiting for stable Pangolin Traefik config endpoint readiness"
              exit 1
          securityContext:
            {{- toYaml (mergeOverwrite (dict "runAsNonRoot" true "runAsUser" 65534 "allowPrivilegeEscalation" false "readOnlyRootFilesystem" true "capabilities" (dict "drop" (list "ALL"))) ($controllerWait.securityContext | default dict)) | nindent 12 }}
          volumeMounts:
            {{- if $tlsEnabled }}
            - name: tls
              mountPath: /etc/pangolin/tls
              readOnly: true
            {{- end }}
            - name: tmp
              mountPath: /tmp
      {{- end }}
      containers:
        - name: controller
          image: {{ include "pangolin.controller.image" $root }}
          imagePullPolicy: {{ include "pangolin.controller.imagePullPolicy" $root }}
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "pangolin.controller.configMapName" $root }}
          {{- if $ctrl.extraEnv }}
          env:
          {{- range $k, $v := $ctrl.extraEnv }}
          - name: {{ $k }}
            value: {{ $v | quote }}
          {{- end }}
          {{- end }}
          volumeMounts:
            {{- if $tlsEnabled }}
            - name: tls
              mountPath: /etc/pangolin/tls
              readOnly: true
            {{- end }}
            - name: tmp
              mountPath: /tmp
          {{- with $ctrl.probes }}
          {{- if .startup }}
          startupProbe:
            {{- if .startup.httpGet }}
            httpGet:
              path: {{ .startup.httpGet.path }}
              port: {{ .startup.httpGet.port }}
            {{- else if .startup.exec }}
            exec:
              command:
                {{- range .startup.exec.command }}
                - {{ . | quote }}
                {{- end }}
            {{- end }}
            initialDelaySeconds: {{ .startup.initialDelaySeconds }}
            periodSeconds: {{ .startup.periodSeconds }}
            timeoutSeconds: {{ .startup.timeoutSeconds }}
            failureThreshold: {{ .startup.failureThreshold }}
          {{- end }}
          {{- if .liveness }}
          livenessProbe:
            {{- if .liveness.httpGet }}
            httpGet:
              path: {{ .liveness.httpGet.path }}
              port: {{ .liveness.httpGet.port }}
            {{- else if .liveness.exec }}
            exec:
              command:
                {{- range .liveness.exec.command }}
                - {{ . | quote }}
                {{- end }}
            {{- end }}
            initialDelaySeconds: {{ .liveness.initialDelaySeconds }}
            periodSeconds: {{ .liveness.periodSeconds }}
            timeoutSeconds: {{ .liveness.timeoutSeconds }}
            failureThreshold: {{ .liveness.failureThreshold }}
          {{- end }}
          {{- if .readiness }}
          readinessProbe:
            {{- if .readiness.httpGet }}
            httpGet:
              path: {{ .readiness.httpGet.path }}
              port: {{ .readiness.httpGet.port }}
            {{- else if .readiness.exec }}
            exec:
              command:
                {{- range .readiness.exec.command }}
                - {{ . | quote }}
                {{- end }}
            {{- end }}
            initialDelaySeconds: {{ .readiness.initialDelaySeconds }}
            periodSeconds: {{ .readiness.periodSeconds }}
            timeoutSeconds: {{ .readiness.timeoutSeconds }}
            failureThreshold: {{ .readiness.failureThreshold }}
          {{- end }}
          {{- end }}
          resources:
            {{- include "pangolin.renderResources" (dict "resources" $ctrl.resources "root" $root) | nindent 12 }}
          securityContext:
            {{- toYaml (mergeOverwrite (deepCopy $root.Values.global.containerSecurityContext) ($ctrl.securityContext | default dict)) | nindent 12 }}
      volumes:
        {{- if $tlsEnabled }}
        - name: tls
          secret:
            secretName: {{ include "pangolin.controller.tlsSecretName" $root }}
            optional: false
        {{- end }}
        - name: tmp
          emptyDir: {}
{{- end }}
