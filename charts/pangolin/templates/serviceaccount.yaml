{{- $root := . }}
{{- if .Values.serviceAccount.pangolin.create }}
{{- $pangolinSaAnns := mergeOverwrite (dict) (include "pangolin.global.commonAnnotations" $root | fromYaml) (include "pangolin.component.commonAnnotations" (dict "root" $root "component" "pangolin") | fromYaml) (.Values.serviceAccount.pangolin.annotations | default dict) (.Values.pangolin.serviceAccount.annotations | default dict) }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "pangolin.serviceAccountName" . }}
  namespace: {{ include "pangolin.namespace" . }}
  labels:
    {{- include "pangolin.labels" . | nindent 4 }}
    {{- include "pangolin.component.commonLabels" (dict "root" . "component" "pangolin") | nindent 4 }}
    {{- include "pangolin.renderNonSelectorLabels" (dict "labels" (.Values.serviceAccount.pangolin.labels | default dict)) | nindent 4 }}
    {{- include "pangolin.renderNonSelectorLabels" (dict "labels" (.Values.pangolin.serviceAccount.labels | default dict)) | nindent 4 }}
    app.kubernetes.io/component: pangolin
  {{- if gt (len $pangolinSaAnns) 0 }}
  annotations:
    {{- toYaml $pangolinSaAnns | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.pangolin.automountServiceAccountToken }}
{{- end }}
{{- if and .Values.serviceAccount.gerbil.create (eq (include "pangolin.gerbil.resourcesEnabled" .) "true") }}
---
{{- $gerbilSaAnns := mergeOverwrite (dict) (include "pangolin.global.commonAnnotations" $root | fromYaml) (include "pangolin.component.commonAnnotations" (dict "root" $root "component" "gerbil") | fromYaml) (.Values.serviceAccount.gerbil.annotations | default dict) (.Values.gerbil.serviceAccount.annotations | default dict) }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "pangolin.serviceAccountName.gerbil" . }}
  namespace: {{ include "pangolin.namespace" . }}
  labels:
    {{- include "pangolin.labels" . | nindent 4 }}
    {{- include "pangolin.component.commonLabels" (dict "root" . "component" "gerbil") | nindent 4 }}
    {{- include "pangolin.renderNonSelectorLabels" (dict "labels" (.Values.serviceAccount.gerbil.labels | default dict)) | nindent 4 }}
    {{- include "pangolin.renderNonSelectorLabels" (dict "labels" (.Values.gerbil.serviceAccount.labels | default dict)) | nindent 4 }}
    app.kubernetes.io/component: gerbil
  {{- if gt (len $gerbilSaAnns) 0 }}
  annotations:
    {{- toYaml $gerbilSaAnns | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.gerbil.automountServiceAccountToken }}
{{- end }}
{{- if and .Values.serviceAccount.controller.create .Values.controller.enabled (eq .Values.deployment.type "controller") }}
---
{{- $controllerSaAnns := mergeOverwrite (dict) (include "pangolin.global.commonAnnotations" $root | fromYaml) (include "pangolin.component.commonAnnotations" (dict "root" $root "component" "controller") | fromYaml) (.Values.serviceAccount.controller.annotations | default dict) (.Values.controller.serviceAccount.annotations | default dict) }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "pangolin.serviceAccountName.controller" . }}
  namespace: {{ include "pangolin.namespace" . }}
  labels:
    {{- include "pangolin.labels" . | nindent 4 }}
    {{- include "pangolin.component.commonLabels" (dict "root" . "component" "controller") | nindent 4 }}
    {{- include "pangolin.renderNonSelectorLabels" (dict "labels" (.Values.serviceAccount.controller.labels | default dict)) | nindent 4 }}
    {{- include "pangolin.renderNonSelectorLabels" (dict "labels" (.Values.controller.serviceAccount.labels | default dict)) | nindent 4 }}
    app.kubernetes.io/component: controller
  {{- if gt (len $controllerSaAnns) 0 }}
  annotations:
    {{- toYaml $controllerSaAnns | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.controller.automountServiceAccountToken }}
{{- end }}
