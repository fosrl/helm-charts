{{- $mode := include "pangolin.db.mode" . -}}
{{- $db := default (dict) .Values.database -}}
{{- $embedded := default (dict) (get $db "embedded") -}}
{{- $auth := default (dict) (get $embedded "auth") -}}
{{- $generated := default (dict) (get $auth "generatedSecret") -}}
{{- if and (eq $mode "embedded") ((get $embedded "enabled") | default false) ((get $generated "create") | default false) (not (get $auth "existingSecretName")) -}}
{{- $passwordKey := default "password" (get $generated "passwordKey") -}}
{{- $passwordRaw := default "" (get $generated "password") -}}
{{- $password := $passwordRaw -}}
{{- if not $password -}}
{{- $secretName := default (printf "%s-embedded-postgres-auth" (include "pangolin.fullname" .)) (get $generated "name") -}}
{{- $existingSecret := lookup "v1" "Secret" (include "pangolin.namespace" .) $secretName -}}
{{- if and $existingSecret $existingSecret.data (hasKey $existingSecret.data $passwordKey) -}}
{{- $password = index $existingSecret.data $passwordKey | b64dec -}}
{{- else -}}
{{- $password = randAlphaNum 32 -}}
{{- end -}}
{{- end -}}
{{- $metaAnns := include "pangolin.global.commonAnnotations" . | fromYaml -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ default (printf "%s-embedded-postgres-auth" (include "pangolin.fullname" .)) (get $generated "name") }}
  namespace: {{ include "pangolin.namespace" . }}
  labels:
    {{- include "pangolin.labels" . | nindent 4 }}
  {{- if gt (len $metaAnns) 0 }}
  annotations:
    {{- toYaml $metaAnns | nindent 4 }}
  {{- end }}
type: Opaque
data:
  {{ default "database" (get $generated "databaseKey") }}: {{ (get $db "name" | toString) | b64enc | quote }}
  {{ default "username" (get $generated "usernameKey") }}: {{ (get $db "username" | toString) | b64enc | quote }}
  {{ $passwordKey }}: {{ ($password | toString) | b64enc | quote }}
{{- end -}}
