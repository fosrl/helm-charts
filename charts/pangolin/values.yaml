## @section Metrics and monitoring
monitoring:
  # -- Enable generic chart-level metrics Service / scrape integration for Pangolin app.
  enabled: false # @schema type: boolean
  service:
    # -- Create a metrics Service for Pangolin.
    enabled: false # @schema type: boolean
    type: ClusterIP # @schema type: string ; enum: [ClusterIP, NodePort, LoadBalancer]
    port: 9090 # @schema type: integer ; minimum: 1 ; maximum: 65535
    portName: metrics # @schema type: string
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "9090"
      prometheus.io/path: "/metrics"
    labels: {} # @schema type: object ; additionalProperties: { type: string }
  metrics:
    # -- Metrics endpoint port name.
    targetPortName: metrics # @schema type: string
    # -- Metrics endpoint numeric port.
    targetPort: 9090 # @schema type: integer ; minimum: 1 ; maximum: 65535
    # -- Default metrics path.
    path: /metrics # @schema type: string
    # -- Expose internal metrics where supported.
    addInternals: false # @schema type: boolean
    endpoints:
      health: /health/metrics
      performance: /perf/metrics
      application: /app/metrics
    customLabels:
      service: pangolin

  serviceMonitor:
    enabled: false # @schema type: boolean
    apiVersion: monitoring.coreos.com/v1 # @schema type: string
    namespace: "" # @schema type: string
    labels: {} # @schema type: object ; additionalProperties: { type: string }
    annotations: {} # @schema type: object ; additionalProperties: { type: string }
    interval: 30s # @schema type: string
    scrapeTimeout: 10s # @schema type: string
    selector:
      matchLabels:
        app.kubernetes.io/name: pangolin
    honorLabels: true # @schema type: boolean
    scheme: http # @schema type: string
    path: /metrics # @schema type: string
    relabelings: [] # @schema type: array ; item: object
    metricRelabelings: [] # @schema type: array ; item: object
    targetLabels: [] # @schema type: array ; item: string
    sampleLimit: 0 # @schema type: integer ; minimum: 0

  podMonitor:
    enabled: false # @schema type: boolean
    apiVersion: monitoring.coreos.com/v1 # @schema type: string
    namespace: "" # @schema type: string
    labels: {} # @schema type: object ; additionalProperties: { type: string }
    annotations: {} # @schema type: object ; additionalProperties: { type: string }
    portName: internalApi # @schema type: string
    scheme: http # @schema type: string
    path: /metrics # @schema type: string
    interval: 30s # @schema type: string
    scrapeTimeout: 10s # @schema type: string
    relabelings: [] # @schema type: array ; item: object
    metricRelabelings: [] # @schema type: array ; item: object

  prometheusRule:
    enabled: false # @schema type: boolean
