# This workflow uses kind as a deterministic Helm chart install smoke-test
# target. Talos remains the preferred real-world target for Pangolin, and a
# separate Talos-Docker workflow can be added later. This workflow intentionally
# avoids Talos VM-style testing on GitHub-hosted runners.
name: Pangolin Release Smoke Test

on:
  pull_request:
    paths:
      - 'charts/pangolin/**'
      - '.github/workflows/helm-ci.yaml'
      - '.github/workflows/pangolin-e2e.yaml'
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

concurrency:
  group: pangolin-e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  E2E_NAMESPACE: pangolin-e2e
  TRAEFIK_NAMESPACE: traefik-system
  E2E_RELEASE: demo
  E2E_TRAEFIK_RELEASE: e2e-traefik
  E2E_CNPG_NAMESPACE: cnpg-system
  E2E_CNPG_OPERATOR_RELEASE: e2e-cnpg-operator
  KIND_CLUSTER_NAME: pangolin-e2e
  KIND_NODE_IMAGE: kindest/node:v1.31.4

jobs:
  release-install-smoke-test:
    name: Release-gate install smoke test on kind
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (
        github.event_name == 'pull_request' &&
        github.base_ref == 'main' &&
        (github.head_ref == 'dev' || startsWith(github.head_ref, 'release/'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Helm
        uses: Azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.20.2

      - name: Show tool versions
        run: |
          helm version
          kubectl version --client
          docker version

      - name: Add Helm dependency repositories
        run: |
          helm repo add cloudnative-pg https://cloudnative-pg.github.io/charts
          helm repo add traefik https://traefik.github.io/charts
          helm repo update

      - name: Build chart dependencies
        run: helm dependency build charts/pangolin

      - name: Lint chart with E2E values
        run: helm lint charts/pangolin -f charts/pangolin/examples/values-e2e-kind.yaml

      - name: Ensure kind is available
        run: |
          set -euo pipefail
          if ! command -v kind >/dev/null 2>&1; then
            curl -fsSL -o "${RUNNER_TEMP}/kind" https://kind.sigs.k8s.io/dl/v0.31.0/kind-linux-amd64
            chmod +x "${RUNNER_TEMP}/kind"
            echo "${RUNNER_TEMP}" >> "$GITHUB_PATH"
            export PATH="${RUNNER_TEMP}:$PATH"
          fi
          kind --version

      - name: Create kind cluster
        run: |
          kind create cluster --name "${KIND_CLUSTER_NAME}" --image "${KIND_NODE_IMAGE}" --wait 5m
          kubectl cluster-info
          kubectl get nodes -o wide
          kubectl get storageclass

      - name: Install Traefik CRDs/controller
        run: |
          helm upgrade --install "${E2E_TRAEFIK_RELEASE}" traefik/traefik \
            --version 40.0.0 \
            --namespace "${TRAEFIK_NAMESPACE}" \
            --create-namespace \
            --timeout 10m \
            --set service.type=ClusterIP \
            --set ingressRoute.dashboard.enabled=false \
            --set providers.kubernetesCRD.enabled=true
          
          # Do not use --wait for Traefik in kind; instead explicitly wait for deployment
          # because the Service type may remain as LoadBalancer in some chart versions
          # and Helm --wait would timeout waiting for a pending LoadBalancer ingress.
          kubectl rollout status deployment/"${E2E_TRAEFIK_RELEASE}" \
            -n "${TRAEFIK_NAMESPACE}" \
            --timeout=600s
          
          # Verify that the Service is actually ClusterIP (not LoadBalancer)
          SERVICE_TYPE="$(kubectl get svc "${E2E_TRAEFIK_RELEASE}" -n "${TRAEFIK_NAMESPACE}" -o jsonpath='{.spec.type}')"
          if [ "${SERVICE_TYPE}" != "ClusterIP" ]; then
            echo "ERROR: Traefik Service type is ${SERVICE_TYPE}, expected ClusterIP"
            kubectl get svc -n "${TRAEFIK_NAMESPACE}" -o wide
            exit 1
          fi
          
          kubectl get svc,pods -n "${TRAEFIK_NAMESPACE}" -o wide

      - name: Render manifests for diagnostics
        run: |
          mkdir -p rendered
          helm template "${E2E_RELEASE}" charts/pangolin \
            --namespace "${E2E_NAMESPACE}" \
            -f charts/pangolin/examples/values-e2e-kind.yaml \
            > rendered/pangolin-e2e.yaml

      - name: Install CloudNativePG operator
        run: |
          helm upgrade --install "${E2E_CNPG_OPERATOR_RELEASE}" cloudnative-pg/cloudnative-pg \
            --namespace "${E2E_CNPG_NAMESPACE}" \
            --create-namespace \
            --wait \
            --timeout 10m \
            --set crds.create=true
          kubectl wait --for=condition=Established crd/clusters.postgresql.cnpg.io --timeout=300s

      - name: Install Pangolin chart
        run: |
          helm upgrade --install "${E2E_RELEASE}" charts/pangolin \
            --namespace "${E2E_NAMESPACE}" \
            --create-namespace \
            -f charts/pangolin/examples/values-e2e-kind.yaml \
            --wait \
            --timeout 20m

      - name: Wait for CloudNativePG operator, cluster, and PVCs
        run: |
          set -euo pipefail
          kubectl get crd clusters.postgresql.cnpg.io
          operator_deployment="$(kubectl get deployment -n "${E2E_CNPG_NAMESPACE}" -l app.kubernetes.io/instance="${E2E_CNPG_OPERATOR_RELEASE}" -o jsonpath='{.items[0].metadata.name}')"
          test -n "${operator_deployment}"
          kubectl rollout status deployment/"${operator_deployment}" -n "${E2E_CNPG_NAMESPACE}" --timeout=600s
          kubectl wait --for=condition=Ready cluster.postgresql.cnpg.io/pangolin-db -n "${E2E_NAMESPACE}" --timeout=900s
          kubectl get pvc -n "${E2E_NAMESPACE}" -o wide
          pending_pvcs="$(kubectl get pvc -n "${E2E_NAMESPACE}" --field-selector=status.phase!=Bound -o name || true)"
          if [ -n "${pending_pvcs}" ]; then
            echo "PVCs are not Bound:"
            echo "${pending_pvcs}"
            kubectl describe pvc -n "${E2E_NAMESPACE}"
            exit 1
          fi

      - name: Wait for Pangolin workloads
        run: |
          kubectl rollout status deployment/"${E2E_RELEASE}"-pangolin -n "${E2E_NAMESPACE}" --timeout=600s
          kubectl rollout status deployment/"${E2E_RELEASE}"-pangolin-gerbil -n "${E2E_NAMESPACE}" --timeout=600s
          kubectl rollout status deployment/"${E2E_RELEASE}"-pangolin-controller -n "${E2E_NAMESPACE}" --timeout=600s

      - name: Run in-cluster readiness checks
        run: |
          set -euo pipefail
          kubectl port-forward -n "${E2E_NAMESPACE}" svc/"${E2E_RELEASE}"-pangolin 3001:3001 >/tmp/pangolin-port-forward.log 2>&1 &
          pangolin_pf_pid=$!
          kubectl port-forward -n "${E2E_NAMESPACE}" svc/"${E2E_RELEASE}"-pangolin-controller 9090:9090 >/tmp/controller-port-forward.log 2>&1 &
          controller_pf_pid=$!
          trap 'kill ${pangolin_pf_pid} ${controller_pf_pid} >/dev/null 2>&1 || true' EXIT
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3001/api/v1/traefik-config >/tmp/pangolin-traefik-config.json; then
              break
            fi
            if [ "${i}" -eq 60 ]; then
              echo "Pangolin traefik-config endpoint did not become ready"
              cat /tmp/pangolin-port-forward.log || true
              exit 1
            fi
            sleep 2
          done
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:9090/readyz >/tmp/controller-readyz.txt; then
              break
            fi
            if [ "${i}" -eq 60 ]; then
              echo "Pangolin controller readyz endpoint did not become ready"
              cat /tmp/controller-port-forward.log || true
              exit 1
            fi
            sleep 2
          done

      - name: Collect diagnostics
        if: always()
        run: |
          mkdir -p diagnostics
          helm list -A > diagnostics/helm-list.txt || true
          helm status "${E2E_RELEASE}" -n "${E2E_NAMESPACE}" > diagnostics/helm-status-pangolin.txt || true
          helm status "${E2E_TRAEFIK_RELEASE}" -n "${TRAEFIK_NAMESPACE}" > diagnostics/helm-status-traefik.txt || true
          helm status "${E2E_CNPG_OPERATOR_RELEASE}" -n "${E2E_CNPG_NAMESPACE}" > diagnostics/helm-status-cnpg-operator.txt || true
          kubectl get nodes -o wide > diagnostics/kubectl-nodes.txt || true
          kubectl get storageclass -o yaml > diagnostics/storageclasses.yaml || true
          kubectl get all -A -o wide > diagnostics/kubectl-get-all.txt || true
          kubectl get events -A --sort-by=.lastTimestamp > diagnostics/kubectl-events.txt || true
          kubectl describe pods -A > diagnostics/kubectl-describe-pods.txt || true
          kubectl get pvc -A -o wide > diagnostics/kubectl-get-pvc.txt || true
          kubectl get cluster.postgresql.cnpg.io -A -o yaml > diagnostics/cnpg-clusters.yaml || true
          kubectl logs -n "${E2E_NAMESPACE}" deployment/"${E2E_RELEASE}"-pangolin --all-containers=true > diagnostics/pangolin.log || true
          kubectl logs -n "${E2E_NAMESPACE}" deployment/"${E2E_RELEASE}"-pangolin-gerbil --all-containers=true > diagnostics/gerbil.log || true
          kubectl logs -n "${E2E_NAMESPACE}" deployment/"${E2E_RELEASE}"-pangolin-controller --all-containers=true > diagnostics/controller.log || true
          kubectl logs -n "${TRAEFIK_NAMESPACE}" deployment/"${E2E_TRAEFIK_RELEASE}" --all-containers=true > diagnostics/traefik.log || true
          operator_deployment="$(kubectl get deployment -n "${E2E_CNPG_NAMESPACE}" -l app.kubernetes.io/instance="${E2E_CNPG_OPERATOR_RELEASE}" -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)"
          if [ -n "${operator_deployment}" ]; then
            kubectl logs -n "${E2E_CNPG_NAMESPACE}" deployment/"${operator_deployment}" --all-containers=true > diagnostics/cnpg-operator.log || true
          fi
          cnpg_pods="$(kubectl get pods -n "${E2E_NAMESPACE}" -l cnpg.io/cluster=pangolin-db -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' 2>/dev/null || true)"
          if [ -n "${cnpg_pods}" ]; then
            while IFS= read -r pod; do
              [ -n "${pod}" ] || continue
              kubectl logs -n "${E2E_NAMESPACE}" "${pod}" --all-containers=true > "diagnostics/${pod}.log" || true
            done <<< "${cnpg_pods}"
          fi
          kind export logs diagnostics/kind-logs --name "${KIND_CLUSTER_NAME}" || true

      - name: Upload diagnostics artifact
        if: failure() || cancelled()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pangolin-e2e-diagnostics
          path: |
            diagnostics/**
            rendered/**
            /tmp/pangolin-traefik-config.json
            /tmp/controller-readyz.txt
            /tmp/pangolin-port-forward.log
            /tmp/controller-port-forward.log
          if-no-files-found: ignore

      - name: Delete kind cluster
        if: always()
        run: kind delete cluster --name "${KIND_CLUSTER_NAME}"
