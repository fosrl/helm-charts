apiVersion: v1
entries:
  newt:
  - annotations:
      artifacthub.io/category: networking
      artifacthub.io/changes: |
        - kind: changed
          description: "Bump Chart version to 1.3.0 and Chart AppVersion to Newt v1.11.0."
        - kind: added
          description: "Add Newt 1.11 provisioning support via NEWT_PROVISIONING_KEY and NEWT_NAME (backwards compatible with existing ID/secret installs)."
        - kind: added
          description: "Add provisioning blueprint support via PROVISIONING_BLUEPRINT_FILE (with ConfigMap generation + render-time validation)."
        - kind: added
          description: "Add first-class writable config persistence (emptyDir or existing PVC) and auto-wire CONFIG_FILE when enabled."
        - kind: added
          description: "Add optional pprof enablement via NEWT_PPROF_ENABLED."
        - kind: changed
          description: "Update docs and examples for Newt 1.11.0, including a note about upstream ping default changes."
        - kind: changed
          description: "Update docs with examples and update to reflect new configuration options, features and Newt 1.11.0 support."
        - kind: added
          description: "Add a dedicated provisioning blueprint ConfigMap helm-unittest suite to validate rendering, filename extraction, and non-render behavior."
        - kind: changed
          description: "Modernize helm-unittest assertions by replacing deprecated isNotNull/isNull usage with exists/notExists."
        - kind: changed
          description: "Harden chart quality gates and cross-platform CI reliability: clean yamllint output, normalize fixture formatting, and stabilize kubeconform execution in scripts/test.sh."
      artifacthub.io/containsSecurityUpdates: "true"
      artifacthub.io/images: |
        - name: newt-dockerhub
          image: docker.io/fosrl/newt:1.11.0
          whitelisted: false
          platforms:
            - linux/amd64
            - linux/arm64
            - linux/arm/v7
        - name: newt-ghcr
          image: ghcr.io/fosrl/newt:1.11.0
          whitelisted: false
          platforms:
            - linux/amd64
            - linux/arm64
            - linux/arm/v7
      artifacthub.io/license: MIT
      artifacthub.io/links: |
        - name: support
          url: https://github.com/fosrl/helm-charts/issues
        - name: documentation
          url: https://docs.digpangolin.com/self-host/manual/kubernetes
      artifacthub.io/prerelease: "false"
      artifacthub.io/signKey: |
        fingerprint: 48E7F670FCC13645FC48B08D587294B228C2EC2C
        url: https://charts.fossorial.io/pgp_keys.asc
